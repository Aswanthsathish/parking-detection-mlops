name: Parking MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install Flask

    - name: Run Flask App Test
      run: |
        python app.py &
        sleep 5
        curl http://127.0.0.1:5000
